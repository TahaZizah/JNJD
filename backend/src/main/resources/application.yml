server:
  port: 8080
  tomcat:
    threads:
      max: 200
      min-spare: 10
    accept-count: 100
    connection-timeout: 20000

spring:
  application:
    name: jnjd-registration

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/jnjd}
    username: ${SPRING_DATASOURCE_USERNAME:jnjd_user}
    password: ${SPRING_DATASOURCE_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-timeout: 30000
      pool-name: JnjdHikariPool

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 50

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    enabled: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 2

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_STARTTLS_ENABLE:true}
            required: ${MAIL_STARTTLS_REQUIRED:true}
          ssl:
            trust: ${MAIL_HOST:smtp.gmail.com}
        connectiontimeout: 10000
        timeout: 10000
        writetimeout: 10000

  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8

  task:
    execution:
      pool:
        core-size: 4
        max-size: 20
        queue-capacity: 100
        thread-name-prefix: jnjd-async-
      shutdown:
        await-termination: true
        await-termination-period: 30s

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  health:
    mail:
      enabled: false   # Don't fail health check when SMTP creds are not configured

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ROOT_USER:minioadmin}
  secret-key: ${MINIO_ROOT_PASSWORD:minioadmin}
  bucket: ${MINIO_BUCKET:jnjd-proofs}
  public-endpoint: ${MINIO_PUBLIC_ENDPOINT:http://localhost:9000}
  presign-expiry-minutes: 10

jwt:
  secret: ${JWT_SECRET:fallback-secret-replace-in-production-32chars-minimum}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

admin:
  username: ${ADMIN_USERNAME:admin}
  password: ${ADMIN_PASSWORD:changeme}

app:
  cors:
    allowed-origins: ${FRONTEND_ORIGIN:http://localhost:5173}
  rate-limit:
    registration:
      capacity: 5
      refill-minutes: 10
  file:
    allowed-extensions: pdf,png,jpg,jpeg
    allowed-content-types: application/pdf,image/png,image/jpeg,image/jpg
    max-size-bytes: 5242880   # 5 MB
  email:
    from: ${MAIL_FROM:JNJD Registration <cit.inpt@gmail.com>}
    payment-amount: "180 MAD"
    payment-contact: "cit.inpt@gmail.com"

logging:
  level:
    com.jnjd: DEBUG
    org.springframework.security: INFO
    io.minio: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
